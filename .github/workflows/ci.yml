name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript + admin panel)
        run: npm run build
        env:
          NODE_ENV: production
          # Strapi requires these to be present at build time even if unused
          APP_KEYS: ci-key-1,ci-key-2,ci-key-3,ci-key-4
          API_TOKEN_SALT: ci-api-token-salt
          ADMIN_JWT_SECRET: ci-admin-jwt-secret
          TRANSFER_TOKEN_SALT: ci-transfer-token-salt
          JWT_SECRET: ci-jwt-secret
          DATABASE_CLIENT: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: '5432'
          DATABASE_NAME: birdie69_cms_ci
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
